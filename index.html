<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>바이브 코더</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      text-align: center;
      padding: 60px 80px;
      background-color: #16213e;
      border-radius: 16px;
      border: 1px solid #0f3460;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    h1 {
      font-size: 2.8rem;
      color: #e94560;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    p {
      font-size: 1.2rem;
      color: #a8b2d8;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>바이브 코더</h1>
    <p>AI와 함께 만드는 첫 번째 웹페이지</p>
  </div>
</body>
</html>
