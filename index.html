<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>홍길동 - 자기소개</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0d1117;
      color: #c9d1d9;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .card {
      background-color: #161b22;
      border: 1px solid #21262d;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    .avatar {
      width: 80px;
      height: 80px;
      background-color: #00bcd4;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: bold;
      color: #0d1117;
      margin: 0 auto 24px;
    }

    h1 {
      font-size: 2rem;
      color: #00e5ff;
      text-align: center;
      margin-bottom: 8px;
    }

    .intro {
      text-align: center;
      color: #8b949e;
      font-size: 1rem;
      margin-bottom: 32px;
    }

    .section-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #00bcd4;
      margin-bottom: 12px;
    }

    .hobbies {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .hobby {
      background-color: #0d1117;
      border: 1px solid #21262d;
      border-left: 3px solid #00bcd4;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.95rem;
    }

    @media (max-width: 480px) {
      .card {
        padding: 36px 24px;
      }

      h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">홍</div>
    <h1>홍길동</h1>
    <p class="intro">바이브 코딩 입문자</p>

    <p class="section-title">취미</p>
    <div class="hobbies">
      <div class="hobby">독서</div>
      <div class="hobby">음악 감상</div>
      <div class="hobby">산책</div>
    </div>
  </div>
</body>
</html>
